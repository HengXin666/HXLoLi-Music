name: "[LoLi-Music]: 自动生成播放列表"

on:
  push:
    branches: [main]
    paths:
      - 'static/music/**'
      - 'py/music/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- Job 1: 生成并提交 playlist.json ---
  generate-playlist:
    # 跳过 Bot 自己的提交, 避免无限循环
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[LoLi-Bot]')
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.auto-commit.outputs.changes_detected }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 启用 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: 安装 uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: 安装 Python 依赖
        run: |
          source $HOME/.cargo/env
          uv sync
        working-directory: ./py

      - name: 生成 playlist.json
        run: |
          source $HOME/.cargo/env
          uv run python -m music.gen_music_playlist
        working-directory: ./py
        env:
          PYTHONUNBUFFERED: "1"

      - name: 召唤 萝莉小猫娘 帮忙 push
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[LoLi-Bot]: ご主人さま、プレイリストを更新しましたにゃ♪'
          commit_user_name: 'Heng_Xin[LoLi-Bot]'
          commit_user_email: '282000500@qq.com'
          commit_author: 'Heng_Xin[LoLi-Bot] <282000500@qq.com>'
          file_pattern: 'playlist.json .playlist_cache.json static/music/** static/info/**'

  # --- Job 2: 向 HXLoLi 主仓库发 PR 同步 MUSIC_COMMIT_ID ---
  sync-to-main-repo:
    needs: generate-playlist
    # 无论 playlist.json 是否变化, 只要 Job 1 成功就同步 (因为可能是音频文件变更但列表没变)
    if: always() && needs.generate-playlist.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 获取当前仓库最新 commit hash
        id: get-commit
        run: |
          # 获取 HXLoLi-Music 仓库 main 分支的最新 commit SHA
          LATEST_SHA=$(curl -s \
            -H "Authorization: token ${{ secrets.MAIN_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/HengXin666/HXLoLi-Music/git/ref/heads/main" \
            | jq -r '.object.sha')
          echo "commit_sha=${LATEST_SHA}" >> $GITHUB_OUTPUT
          echo "🎵 HXLoLi-Music 最新 commit: ${LATEST_SHA}"

      - name: 检查是否需要更新 & 创建 PR
        env:
          PAT: ${{ secrets.MAIN_REPO_PAT }}
          NEW_SHA: ${{ steps.get-commit.outputs.commit_sha }}
          MAIN_REPO: HengXin666/HXLoLi
          PR_BRANCH: bot/sync-music-version
        run: |
          # 1. 读取主仓库 data/musicVersion.ts 内容
          FILE_RESP=$(curl -s \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${MAIN_REPO}/contents/data/musicVersion.ts?ref=main")

          FILE_SHA=$(echo "${FILE_RESP}" | jq -r '.sha')
          CONTENT_B64=$(echo "${FILE_RESP}" | jq -r '.content')
          CURRENT_CONTENT=$(echo "${CONTENT_B64}" | base64 -d)

          # 2. 提取当前 MUSIC_COMMIT_ID
          CURRENT_ID=$(echo "${CURRENT_CONTENT}" | grep -oP "MUSIC_COMMIT_ID = '\K[^']+")
          echo "当前 MUSIC_COMMIT_ID: ${CURRENT_ID}"
          echo "最新 commit SHA:      ${NEW_SHA}"

          if [ "${CURRENT_ID}" = "${NEW_SHA}" ]; then
            echo "✅ MUSIC_COMMIT_ID 已是最新, 无需更新"
            exit 0
          fi

          echo "🔄 需要更新 MUSIC_COMMIT_ID"

          # 3. 构造新文件内容
          NEW_CONTENT="// HXLoLi-Music 仓库的最新 commit_id (每次音乐仓库更新后需同步修改)
          export const MUSIC_COMMIT_ID = '${NEW_SHA}';"
          # 去除 heredoc 可能带来的前导空格
          NEW_CONTENT=$(echo "${NEW_CONTENT}" | sed 's/^          //')
          NEW_CONTENT_B64=$(echo "${NEW_CONTENT}" | base64 -w 0)

          # 4. 获取 main 分支的最新 commit SHA (用于创建新分支)
          MAIN_SHA=$(curl -s \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${MAIN_REPO}/git/ref/heads/main" \
            | jq -r '.object.sha')

          # 5. 创建或重置 PR 分支
          BRANCH_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${MAIN_REPO}/git/ref/heads/${PR_BRANCH}")

          if [ "${BRANCH_EXISTS}" = "200" ]; then
            echo "🔁 重置已有分支 ${PR_BRANCH}"
            curl -s -X PATCH \
              -H "Authorization: token ${PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${MAIN_REPO}/git/refs/heads/${PR_BRANCH}" \
              -d "{\"sha\": \"${MAIN_SHA}\", \"force\": true}" > /dev/null
          else
            echo "🌿 创建新分支 ${PR_BRANCH}"
            curl -s -X POST \
              -H "Authorization: token ${PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${MAIN_REPO}/git/refs" \
              -d "{\"ref\": \"refs/heads/${PR_BRANCH}\", \"sha\": \"${MAIN_SHA}\"}" > /dev/null
          fi

          # 6. 在 PR 分支上提交更新后的文件
          curl -s -X PUT \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${MAIN_REPO}/contents/data/musicVersion.ts" \
            -d "{
              \"message\": \"[LoLi-Bot]: 🎵 同步 HXLoLi-Music commit_id にゃ♪\",
              \"content\": \"${NEW_CONTENT_B64}\",
              \"sha\": \"${FILE_SHA}\",
              \"branch\": \"${PR_BRANCH}\",
              \"committer\": {\"name\": \"Heng_Xin[LoLi-Bot]\", \"email\": \"282000500@qq.com\"},
              \"author\":    {\"name\": \"Heng_Xin[LoLi-Bot]\", \"email\": \"282000500@qq.com\"}
            }" > /dev/null
          echo "📝 已提交更新后的 musicVersion.ts"

          # 7. 检查是否已有同名 PR (避免重复创建)
          PR_EXISTS=$(curl -s \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${MAIN_REPO}/pulls?head=HengXin666:${PR_BRANCH}&state=open" \
            | jq 'length')

          if [ "${PR_EXISTS}" -gt "0" ]; then
            echo "✅ PR 已存在, 已更新分支内容, 无需重新创建"
            exit 0
          fi

          # 8. 创建 PR
          PR_BODY="ご主人さま、音楽リポジトリが更新されましたにゃ♪\n\n**更新内容:**\n- 同步 \`MUSIC_COMMIT_ID\` → \`${NEW_SHA}\`\n- 来源: [HXLoLi-Music@main](https://github.com/HengXin666/HXLoLi-Music/commit/${NEW_SHA})\n\n> 🤖 此 PR 由 GitHub Actions 自动创建"
          curl -s -X POST \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${MAIN_REPO}/pulls" \
            -d "{
              \"title\": \"🎵 [LoLi-Bot] 同步 HXLoLi-Music 最新版本\",
              \"body\": \"${PR_BODY}\",
              \"head\": \"${PR_BRANCH}\",
              \"base\": \"main\"
            }" | jq -r '"🎉 PR 已创建: " + .html_url'
